<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== BODY ===== */
body { 
    font-family: Arial; 
    margin: 0;
    zoom: 1.2;
}

/* ===== TABLE ===== */
table { 
    border-collapse: collapse; 
    margin: 20px auto;
}

/* ===== CELLULES ===== */
td, th {
    width: 26px;
    height: 26px;
    text-align: center;
    font-size: 11px;
    padding: 0;
}

/* ===== INPUTS ===== */
input {
    width: 100%;
    height: 100%;
    border: 1px solid #777;
    box-sizing: border-box;
    text-align: center;
}

/* ===== LIGNES ÉPAISSES ===== */
tr:nth-child(5n+3) input {
    border-bottom: 2px solid #555;
}

/* ===== COLONNES ÉPAISSES ===== */
td:nth-child(5n+4) input {
    border-right: 2px solid #555;
}

/* ===== ENTÊTES ===== */
th {
    border: 1px solid #777;
    background: #f0f0f0;
}

/* ===== RECOPIE ===== */
.copy {
    width: 70px;
    border-top: 1px solid #777;
    border-bottom: 1px solid #777;
}

/* ===== BOUTON ===== */
.calc-btn {
    display: block;
    margin: 10px 0; /* plus de margin-left */
    margin-bottom: 5px;
    padding: 8px 20px;
    font-size: 15px;
    background: linear-gradient(#5da9ff, #2a6fd6);
    color: white;
    border: none;
    border-radius: 8px;
    box-shadow: 0 3px #1a4fa0;
}

.calc-btn.pdf {
    background: linear-gradient(#28a745, #1e7e34);
    box-shadow: 0 3px #145c2b;   /* 🔥 vert foncé */
}
    
.calc-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px #1a4fa0;
}

.invalid {
    background-color: red !important;
}

/* quadrillage pour colonnes Recopie + numéros */
.copy, td:nth-child(2) {
    border: 1px solid #777;
}

/* lignes épaisses (mêmes que grille) */
tr:nth-child(5n+3) td:nth-child(2),
tr:nth-child(5n+3) .copy {
    border-bottom: 2px solid #555;
}

/* séparation verticale plus visible */
td:nth-child(2) {
    border-right: 2px solid #555;
}

#result {
    transform: translateY(-80px);
    border-collapse: collapse;
    font-size: 13px;
    page-break-inside: avoid;
}

/* ENTÊTE */
#result th {
    background: #ffe600;
    border: 1px solid black;
    padding: 2px 5px;
    height: 22px;
    font-size:12px;
}

/* CELLULES */
#result td {
    border: 1px solid black;
    padding: 0px 5px;
    height: 14px;
    line-height: 14px;
    font-size: 12px;
    text-align: center;
}

/* COLONNE COULEUR */
#result td:first-child {
    width: 140px;
    white-space: nowrap; /* empêche retour ligne */
    text-align: left;
    padding-left: 8px;
}

/* LIGNE TOTAL */
#result tr:last-child td {
    border-top: 3px solid black;
    border-bottom: 3px solid black;
    font-weight: bold;
}

#result tr:last-child td {
    border: 3px solid black;
    font-weight: bold;
}

.container {
    width: fit-content;
    margin: 0 auto; /* centre l'ensemble */
}

.header h3 {
    margin: 0;
    white-space: nowrap;
}
/* titre centré */
.titre {
    text-align: center;
    margin-bottom: 5px;
}

.crampe-label {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    text-align: center;
    white-space: nowrap;
    vertical-align: middle;
    width: 30px;
}

/* container déjà centré */
.container {
    width: fit-content;
    margin: 0 auto;
}

/* header aligné à gauche du tableau */
.header {
    width: 100%;
    display: flex;
    justify-content: flex-start;
}

/* légende */
.legende {
    margin-top: 5px;
}
    
/* légende */
.legende {
    margin-top: 5px;
}

.legende-titre {
    font-size: 13px;
    margin-bottom: 3px;
}

.legende-ligne {
    display: flex;
    gap: 2px;
}

/* cases */
.case {
    display: inline-block;
    width: 28px;
    height: 22px;
    line-height: 22px;
    text-align: center;
    border: 1px solid black;
    font-size: 12px;
}

/* couleurs */
.B { background:#fff; color:#000; }
.N { background:#000; color:#fff; }
.GF { background:#505050; color:#fff; }
.GP { background:#ccc; color:#000; }
.BL { background:#0078d7; color:#fff; }
.V { background:#00b050; color:#fff; }
.O { background:#ff8c00; color:#000; }
.J { background:#ffff00; color:#000; }
.BR { background:#964b00; color:#fff; }

/* ============================= */
/* IMPRESSION */
/* ============================= */

@media print {

    @page {
        size: landscape;
        margin: 10mm;
    }

    body {
        zoom: 1.1;
    }

    /* cacher bouton */
    .calc-btn {
        display: none;
    }

    /* ===== GRID ===== */

    #grid td, #grid th {
        border: 1px solid #777 !important;
        width: 16px;
        height: 16px;
        font-size: 9px;
        line-height: 16px;
        vertical-align: middle;
        overflow: hidden;
    }

    #grid td {
        white-space: nowrap;
    }
    
    /* FIX iPad input */
    #grid input {
        display: flex;              /* 🔥 important */
        align-items: center;        /* centre vertical */
        justify-content: center;    /* centre horizontal */

        width: 100%;
        height: 100%;

        margin: 0;
        padding: 0;
        border: none;

        font-size: 9px;
        font-family: monospace;     /* 🔥 clé du fix iPad */
        letter-spacing: -0.3px;     /* évite expansion */

        line-height: 16px;

        box-sizing: border-box;
        background: transparent;
    }

    #grid tr:last-child input {
        height: 100% !important;
        line-height: 16px !important;
    }
    
    /* lignes fortes */
    #grid tr:nth-child(5n) td {
        border-bottom: 2px solid #555 !important;
    }

    #grid td:nth-child(5n) {
        border-right: 2px solid #555 !important;
    }

    /* corriger dernière ligne */
    #grid tr:last-child td {
        height: 16px !important;
        line-height: 16px !important;
        padding: 0 !important;
    }
    /* ===== LAYOUT ===== */

    .container {
        display: block;
    }

    #grid {
        margin-bottom: 20px;
    }

    #result {
        margin-top: 10px;
    }

    table {
        page-break-inside: avoid;
    }

    /* ===== RESULT TABLE ===== */

    #result td {
        padding: 0 4px;
        height: 14px;
        line-height: 14px;
        font-size: 10px;
    }

    #result th {
        padding: 2px 4px;
        height: 20px;
        font-size: 10px;
    }

    /* ===== COULEURS ===== */

    * {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }

    /* légende */
    .case {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }

    /* colonne couleur tableau résultat */
    #result td:first-child {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }

    /* cacher input */
    .print-mode input {
        display: none !important;
    }

    /* afficher texte propre */
    .print-mode::after {
        content: attr(data-print);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        font-size: 9px;
    }
}
/* ================= PDF ONLY ================= */
.pdf-mode .crampe-label {
    writing-mode: horizontal-tb !important;
    transform: none !important;
    white-space: normal !important;
    font-size: 10px;
    color: transparent;
}

.pdf-mode .crampe-label::after {
    content: "C\A r\A a\A m\A p\A e\A s\A \A n\A o";
    white-space: pre;
    display: block;
    text-align: center;
    line-height: 14px;
}
    
.pdf-mode #result {
    margin-top: -40px !important;
    position: relative;
    z-index: 1;
}

.pdf-mode #grid td,
.pdf-mode #grid th {
    height: 16px !important;
    line-height: 16px !important;
}

.pdf-mode #grid input {
    font-family: monospace !important;
    letter-spacing: -0.3px;
}
    
.pdf-mode #grid {
    margin-bottom: 40px !important;
}
    
</style>
</head>


    
<body>

<div class="container">
<h3 class="titre">Plan de montage</h3>

<div class="header">
    <div class="legende">
        <div class="legende-titre">Liste des codes de couleurs:</div>
        <div class="legende-ligne">
            <span class="case B">B</span>
            <span class="case N">N</span>
            <span class="case GP">GP</span>
            <span class="case GF">GF</span>
            <span class="case BL">BL</span>
            <span class="case V">V</span>
            <span class="case O">O</span>
            <span class="case J">J</span>
            <span class="case BR">BR</span>
        </div>
    </div>
</div>

    <table id="grid"></table>

    <button class="calc-btn" onclick="calculer()">Calculer</button>
    <button class="calc-btn pdf" onclick="genererPDF()">Créer PDF</button>
    
    <table id="result"></table>
</div>

<script>

const couleurs = {
B:{nom:"Blanc",bg:"#fff",color:"#000"},
N:{nom:"Noir",bg:"#000",color:"#fff"},
GF:{nom:"Gris foncé",bg:"#505050",color:"#fff"},
GP:{nom:"Gris pâle",bg:"#ccc",color:"#000"},
BL:{nom:"Bleu",bg:"#0078d7",color:"#fff"},
V:{nom:"Vert",bg:"#00b050",color:"#fff"},
O:{nom:"Orange",bg:"#ff8c00",color:"#000"},
J:{nom:"Jaune",bg:"#ffff00",color:"#000"},
BR:{nom:"Brun",bg:"#964b00",color:"#fff"}
};

const lignes = 13;
const colonnes = 30;

let table = document.getElementById("grid");

/* ===== FILS NO ===== */
let titre = document.createElement("tr");
titre.innerHTML = "<th></th><th></th><th></th><th colspan='30'>Fils no.</th>";
table.appendChild(titre);

/* ===== ENTÊTE ===== */
let tr = document.createElement("tr");
tr.innerHTML = "<th></th><th class='crampe-label' rowspan='14'>Crampes no.</th><th></th>";

for(let c=1;c<=colonnes;c++){
    tr.innerHTML += "<th>"+c+"</th>";
}
table.appendChild(tr);

let cells = [];

/* ===== LIGNES ===== */
for(let i=0;i<lignes;i++){

    let tr = document.createElement("tr");
    cells[i]=[];

    /* Recopie */
    let btn = document.createElement("td");
    btn.className="copy";
    btn.innerText="Recopie";
    btn.onclick = ()=>copier(i);
    tr.appendChild(btn);

    /* numéro de crampe */
    let num = document.createElement("td");
    num.innerText = i+1;
    tr.appendChild(num);

    for(let j=0;j<colonnes;j++){

        let td = document.createElement("td");
        let input = document.createElement("input");

        input.oninput = ()=>{
            let v = input.value.toUpperCase();
            input.value = v;
            td.setAttribute("data-val", v); // 🔥 AJOUT
            if(couleurs[v]){
                input.style.background=couleurs[v].bg;
                input.style.color=couleurs[v].color;
                input.classList.remove("invalid");
            } else if(v===""){
                input.style.background="";
                input.classList.remove("invalid");
            } else {
                input.classList.add("invalid");
            }

            sauver();
        };

        td.appendChild(input);
        tr.appendChild(td);
        cells[i][j]=input;
    }

    table.appendChild(tr);
}

/* ===== COPIE ===== */
function copier(i){
    let v = cells[i][0].value;
    for(let j=0;j<colonnes;j++){
        cells[i][j].value=v;
        cells[i][j].dispatchEvent(new Event("input"));
    }
}

/* ===== SAUVEGARDE ===== */
function sauver(){
    localStorage.setItem("montage", JSON.stringify(cells.map(r=>r.map(c=>c.value))));
}

/* ===== CHARGEMENT ===== */
(function(){
    let data = JSON.parse(localStorage.getItem("montage")||"[]");
    data.forEach((row,i)=>{
        row.forEach((val,j)=>{
            if(cells[i]&&cells[i][j]){
                cells[i][j].value=val;
                cells[i][j].dispatchEvent(new Event("input"));
            }
        });
    });
})();

/* ===== CHARGEMENT ===== */
let pdfEnCours = false;

function genererPDF(){
    if(pdfEnCours) return;   // 🔥 bloque double lancement
    pdfEnCours = true;

    document.body.classList.add("pdf-mode");

    const element = document.querySelector(".container");

    const opt = {
        margin: 5,
        filename: 'plan-montage.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 3 },
        jsPDF: { unit: 'mm', format: 'letter', orientation: 'landscape' }
    };

    html2pdf().set(opt).from(element).save().then(() => {
        document.body.classList.remove("pdf-mode");
        pdfEnCours = false;
    });
}

/* ===== CALCUL ===== */
function calculer(){

    let counts = {};
    let maxLigne = {};

    // ===== COMPTER =====
    for(let i=0;i<lignes;i++){
        let temp = {};

        for(let j=0;j<colonnes;j++){
            let v = cells[i][j].value;

            if(couleurs[v]){
                counts[v] = (counts[v] || 0) + 1;
                temp[v] = (temp[v] || 0) + 1;
            }
        }

        for(let c in temp){
            maxLigne[c] = Math.max(maxLigne[c] || 0, temp[c]);
        }
    }

    // ===== PARAMÈTRES =====
    let nb = 90;
    let long = 40;
    let perte = 36;

    let longTot = ((nb * long) + perte) * 0.0254;

    // ===== CALCUL =====
    let data = [];

    for(let c in counts){

        let l = counts[c] * longTot;
        let p = l / 7.68 * 1.1;

        let bobL = Math.ceil(p / 230);
        let bobM = Math.ceil(maxLigne[c] / 2);
        let bobT = Math.max(bobL, bobM);

        data.push({
            nom: couleurs[c].nom,
            fils: counts[c],
            long: bobL,
            montage: bobM,
            total: bobT,
            bg: couleurs[c].bg,
            color: couleurs[c].color
        });
    }

    // ===== TRI =====
    data.sort((a,b)=>b.total - a.total);

    // ===== TABLEAU =====
    let html = `
    <tr>
        <th>Couleur</th>
        <th>Nombre Fils</th>
        <th>Nombre Bobines<br>(longueur)</th>
        <th>Nombre Bobines<br>(montage)</th>
        <th>Nombre Bobines<br>(totales)</th>
    </tr>
    `;

    let totalGlobal = 0;

    data.forEach(d => {

        totalGlobal += d.total;

        html += `
        <tr>
            <td style="background:${d.bg}; color:${d.color}">${d.nom}</td>
            <td>${d.fils}</td>
            <td>${d.long}</td>
            <td>${d.montage}</td>
            <td><b>${d.total}</b></td>
        </tr>`;
    });

    // ===== TOTAL =====
    html += `
    <tr>
        <td colspan="4" style="text-align:right;"><b>Total</b></td>
        <td><b>${totalGlobal}</b></td>
    </tr>
    `;

    document.getElementById("result").innerHTML = html;
}

// avant impression
window.addEventListener("beforeprint", () => {
    document.querySelectorAll("#grid td").forEach(td => {
        const input = td.querySelector("input");
        if(input){
            td.setAttribute("data-print", input.value);
            td.classList.add("print-mode");
        }
    });
});

// après impression
window.addEventListener("afterprint", () => {
    document.querySelectorAll("#grid td").forEach(td => {
        td.classList.remove("print-mode");
    });
});
    
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
</body>
</html>
